<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Fitness App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h2>My Activities</h2>
    <button onclick="logout()" style="float:right;">Logout</button>
    
    <div id="activityList"></div>

    <h3>Add Activity</h3>
    <input type="text" id="type" placeholder="Type (e.g., Running)" />
    <input type="number" id="duration" placeholder="Duration (min)" />
    <input type="number" id="calories" placeholder="Calories burned" />
    <button onclick="addActivity()">Add</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
